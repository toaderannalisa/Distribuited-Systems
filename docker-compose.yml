services:
  # ============================================
  # TRAEFIK REVERSE PROXY
  # ============================================
  reverse-proxy:
    image: traefik:v3.2
    container_name: reverse-proxy
    command:
      - "--api.insecure=true"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--log.level=DEBUG"
      - "--accesslog=true"
    ports:
      - "80:80"      # Traefik HTTP entrypoint
      - "8080:8080"   # Traefik Dashboard only
    volumes:
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - proxy-network
    labels:
      - "traefik.enable=true"

  # ============================================
  # BAZE DE DATE
  # ============================================
  person-db:
    image: mysql:8.0
    container_name: person-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: person_db
    ports:
      - "3307:3306"
    volumes:
      - person-mysql:/var/lib/mysql
    networks:
      - proxy-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      timeout: 5s
      retries: 10
      interval: 5s
      start_period: 30s

  device-db:
    image: mysql:8.0
    container_name: device-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: device_db
    ports:
      - "3308:3306"
    volumes:
      - device-mysql:/var/lib/mysql
    networks:
      - proxy-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      timeout: 5s
      retries: 10
      interval: 5s
      start_period: 30s

  monitoring-db:
    image: mysql:8.0
    container_name: monitoring-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: monitoring_db
    ports:
      - "3309:3306"
    volumes:
      - monitoring-mysql:/var/lib/mysql
    networks:
      - proxy-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      timeout: 5s
      retries: 10
      interval: 5s
      start_period: 30s

  # ============================================
  # RABBITMQ MESSAGE BROKER
  # ============================================
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: anna
      RABBITMQ_DEFAULT_PASS: anna
    networks:
      - proxy-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # PERSON SERVICE
  # ============================================
  person-backend:
    build:
      context: ./demoperson
      dockerfile: Dockerfile
    image: person-backend-image
    container_name: person-backend
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://person-db:3306/person_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SERVER_PORT=8081
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=anna
      - SPRING_RABBITMQ_PASSWORD=anna
    depends_on:
      person-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - proxy-network

  # ============================================
  # DEVICE SERVICE
  # ============================================
  device-backend:
    build:
      context: ./demodevice
      dockerfile: Dockerfile
    image: device-backend-image
    container_name: device-backend
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://device-db:3306/device_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SERVER_PORT=8082
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=anna
      - RABBITMQ_PASSWORD=anna
    depends_on:
      device-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - proxy-network

  # ============================================
  # MONITORING SERVICE
  # ============================================
  monitoring-backend:
    build:
      context: ./demomonitoring
      dockerfile: Dockerfile
    image: monitoring-backend-image
    container_name: monitoring-backend
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://monitoring-db:3306/monitoring_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SERVER_PORT=8083
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=anna
      - SPRING_RABBITMQ_PASSWORD=anna
    depends_on:
      monitoring-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - proxy-network

  # ============================================
  # FRONTEND SERVICE
  # ============================================
  frontend:
    build:
      context: ./react-demo
      dockerfile: Dockerfile
    image: frontend-image
    container_name: energy-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - proxy-network
    depends_on:
      - person-backend
      - device-backend

  # ============================================
  # DEMONOTIFICATION SERVICE (WebSocket)
  # ============================================
  demonotification-backend:
    build:
      context: ./demonotification
      dockerfile: Dockerfile
    image: demonotification-backend-image
    container_name: demonotification-backend
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      - SERVER_PORT=8090
    networks:
      - proxy-network

  # ============================================
  # CHATBOT SERVICE (Customer Support)
  # ============================================
  chatbot-backend:
    build:
      context: ./chatbot
      dockerfile: Dockerfile
    image: chatbot-backend-image
    container_name: chatbot-backend
    restart: unless-stopped
    ports:
      - "8091:8091"
    environment:
      - SERVER_PORT=8091
      - GOOGLE_API_KEY=AIzaSyDRCisyJrhFz_ScMwUpolG0RdPZ7NX5_v0
    networks:
      - proxy-network

networks:
  proxy-network:
    driver: bridge
    name: proxy-network

volumes:
  person-mysql:
  device-mysql:
  monitoring-mysql: